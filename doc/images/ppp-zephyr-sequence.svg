<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Simple diagram styled to match doc/images/dialup-ppp-cmux.svg palette -->
<svg
  width="720"
  height="882"
  viewBox="0 0 720 882"
  version="1.1"
  xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
      .stHost { fill:#6AD1E3; stroke:none; }
      .stBlue { fill:#0077C8; stroke:none; }
      .stGrey { fill:#D9E1E2; stroke:none; }
      .stStroke { fill:none; stroke:none; }
      .stDivider { fill:none; stroke:#000000; stroke-width:2; stroke-dasharray:6,4; }
      .stText { fill:#000000; font-family:Arial; font-size:16px; }
      .stTextSmall { fill:#000000; font-family:Arial; font-size:13px; }
      .stTextInv { fill:#ffffff; font-family:Arial; font-size:16px; }
      .stTextInvSmall { fill:#ffffff; font-family:Arial; font-size:13px; }
      .stTextDark { fill:#000000; font-family:Arial; font-size:13px; }
      .stMono { fill:#000000; font-family:"Courier New", Courier, monospace; font-size:14px; }
      .stMonoSmall { fill:#000000; font-family:"Courier New", Courier, monospace; font-size:12px; }
      .stMonoInv { fill:#ffffff; font-family:"Courier New", Courier, monospace; font-size:14px; }
      .stMonoDark { fill:#333F48; font-family:"Courier New", Courier, monospace; font-size:14px; }
      .stMonoSmallDark { fill:#333F48; font-family:"Courier New", Courier, monospace; font-size:12px; }
    ]]></style>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#000000" />
    </marker>
  </defs>

  <!-- Timeline arrow -->
  <line x1="90" y1="30" x2="90" y2="852" stroke="#000000" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="90" y="872" text-anchor="middle" class="stTextSmall">Time</text>

  <!-- Outer container -->
  <rect x="140" y="30" width="520" height="822" class="stStroke"/>

  <!-- UART header -->
  <rect x="140" y="30" width="520" height="44" class="stBlue"/>
  <text x="400" y="58" text-anchor="middle" class="stTextInv">UART (AT command mode)</text>

  <!-- Pre-CMUX: single AT channel -->
  <rect x="140" y="74" width="520" height="68" class="stGrey"/>

  <text x="160" y="104" class="stMonoDark">AT#XCMUX=1</text>
  <text x="360" y="104" class="stMonoSmallDark">// Enter CMUX mode</text>
  <text x="160" y="132" class="stMonoDark">OK</text>

  <!-- CMUX switch banner -->
  <line x1="140" y1="142" x2="660" y2="142" class="stDivider"/>
  <rect x="140" y="142" width="520" height="36" class="stBlue"/>
  <text x="400" y="166" text-anchor="middle" class="stTextInvSmall">UART enters CMUX mode (GSM 07.10)</text>

  <!-- Split headers -->
  <rect x="140" y="178" width="260" height="34" class="stBlue"/>
  <rect x="400" y="178" width="260" height="34" class="stBlue"/>
  <text x="270" y="200" text-anchor="middle" class="stTextInvSmall">DLC1 (AT command mode)</text>
  <text x="530" y="200" text-anchor="middle" class="stTextInvSmall">DLC2 (PPP)</text>

  <!-- DLC1: AT commands + PPP sequences -->
  <rect x="140" y="212" width="260" height="640" class="stGrey"/>

  <!-- DLC2: CMUX unused + #XPPP notifications + AT commands -->
  <rect x="400" y="212" width="260" height="140" class="stGrey"/>
  <rect x="400" y="352" width="260" height="348" class="stGrey"/>
  <rect x="400" y="700" width="260" height="152" class="stGrey"/>

  <!-- DLC1 content -->
  <text x="156" y="240" class="stMonoDark">AT#XPPP=1</text>
  <text x="156" y="268" class="stMonoDark">OK</text>

  <text x="156" y="300" class="stMonoDark">AT+CFUN=1</text>
  <text x="156" y="328" class="stMonoDark">OK</text>

  <text x="156" y="360" class="stMonoDark">AT#XCMUX=2</text>
  <text x="156" y="388" class="stMonoDark">OK</text>

  <!-- DLC1 enters PPP data mode -->
  <rect x="140" y="463" width="260" height="26" class="stBlue"/>
  <text x="270" y="481" text-anchor="middle" class="stTextInvSmall">DLC1 enters PPP data mode</text>

  <!-- PPP data mode box (Nordic Sky) -->
  <rect x="140" y="489" width="260" height="253" class="stHost"/>

  <text x="156" y="511" class="stMono">sent [LCP ConfReq ..]</text>
  <text x="156" y="530" class="stMonoSmall">...</text>
  <text x="156" y="549" class="stMono">rcvd [LCP ConfAck ...]</text>
  <text x="156" y="568" class="stMono">sent [IPCP ConfReq ...]</text>
  <text x="156" y="587" class="stMonoSmall">...</text>
  <text x="156" y="606" class="stMono">rcvd [IPCP ConfAck ...]</text>

  <text x="156" y="645" class="stMonoSmall">// ... IP data traffic</text>

  <text x="156" y="689" class="stMonoSmall">// PPP termination</text>
  <text x="156" y="708" class="stMono">sent [LCP TermReq ...]</text>
  <text x="156" y="727" class="stMono">rcvd [LCP TermAck ...]</text>

  <!-- PPP detach from DLC -->
  <rect x="140" y="742" width="260" height="26" class="stBlue"/>
  <text x="270" y="760" text-anchor="middle" class="stTextInvSmall">PPP detach from DLC</text>

  <!-- AT channel switch to DLC1 -->
  <line x1="140" y1="768" x2="660" y2="768" class="stDivider"/>
  <rect x="140" y="768" width="260" height="26" class="stBlue"/>
  <text x="270" y="786" text-anchor="middle" class="stTextInvSmall">AT channel switch to DLC1</text>

  <text x="530" y="786" text-anchor="middle" class="stTextInvSmall">CMUX channel unused</text>

  <text x="156" y="816" class="stMonoDark">AT+CFUN=0</text>
  <text x="156" y="844" class="stMonoDark">OK</text>

  <!-- DLC2 content -->
  <text x="530" y="240" text-anchor="middle" class="stTextInvSmall">CMUX channel unused</text>

  <!-- PPP switch to DLC1 / AT channel switch to DLC2 -->
  <line x1="140" y1="405" x2="660" y2="405" class="stDivider"/>
  <rect x="140" y="405" width="260" height="26" class="stBlue"/>
  <rect x="400" y="405" width="260" height="26" class="stBlue"/>
  <text x="270" y="423" text-anchor="middle" class="stTextInvSmall">PPP assigned to DLC1</text>
  <text x="530" y="423" text-anchor="middle" class="stTextInvSmall">AT channel switch to DLC2</text>

  <!-- Gray area with CMUX unused -->
  <rect x="400" y="431" width="260" height="32" class="stGrey"/>
  <text x="270" y="449" text-anchor="middle" class="stTextInvSmall">CMUX channel unused</text>
  <text x="416" y="449" class="stMonoDark">+CGEV: ME PDN ACT ...</text>

  <text x="416" y="481" class="stMonoDark">#XPPP: 1,0,0</text>
  <text x="416" y="606" class="stMonoDark">#XPPP: 1,1,0</text>
  <text x="416" y="742" class="stMonoDark">#XPPP: 0,0,0</text>

  <!-- Divider line between DLCs (rendered on top) -->
  <line x1="400" y1="178" x2="400" y2="852" stroke="#000000" stroke-width="2"/>
</svg>
