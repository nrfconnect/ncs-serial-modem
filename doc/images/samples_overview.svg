<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <defs>
    <style>
      .board-box { fill: #e8f4f8; stroke: #00a9ce; stroke-width: 2; }
      .app-box { fill: #fff9e6; stroke: #ff9800; stroke-width: 2; rx: 5; }
      .connection-line { stroke: #666; stroke-width: 2; fill: none; }
      .arrow { fill: #666; }
      .title-text { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .small-text { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
      .connection-text { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .modem-box { fill: #d4edda; stroke: #28a745; stroke-width: 2; rx: 3; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" class="arrow" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" class="title-text">Serial Modem Host Sample Setup</text>

  <!-- Left side: nRF91 Series DK -->
  <rect x="50" y="80" width="250" height="280" class="board-box" />
  <text x="175" y="110" text-anchor="middle" class="title-text">nRF91 Series DK</text>
  <text x="175" y="130" text-anchor="middle" class="small-text">(nRF9160 / nRF9151)</text>

  <!-- Serial Modem Application -->
  <rect x="70" y="150" width="210" height="80" class="app-box" />
  <text x="175" y="175" text-anchor="middle" class="label-text">Serial Modem</text>
  <text x="175" y="195" text-anchor="middle" class="label-text">Application</text>
  <text x="175" y="215" text-anchor="middle" class="small-text">(AT command interface)</text>

  <!-- Modem -->
  <rect x="90" y="250" width="170" height="50" class="modem-box" />
  <text x="175" y="270" text-anchor="middle" class="label-text">Cellular Modem</text>
  <text x="175" y="290" text-anchor="middle" class="small-text">(LTE-M / NB-IoT)</text>

  <!-- UART pins -->
  <rect x="280" y="175" width="20" height="40" fill="#666" opacity="0.3" />
  <text x="325" y="190" class="connection-text">UART</text>
  <text x="325" y="203" class="connection-text">DTR/RI</text>

  <!-- Right side: Host MCU DK -->
  <rect x="400" y="80" width="250" height="280" class="board-box" />
  <text x="525" y="110" text-anchor="middle" class="title-text">Host MCU DK</text>
  <text x="525" y="130" text-anchor="middle" class="small-text">(nRF54L15 / nRF52 / nRF53)</text>

  <!-- Sample Application -->
  <rect x="420" y="150" width="210" height="80" class="app-box" />
  <text x="525" y="175" text-anchor="middle" class="label-text">Host Sample</text>
  <text x="525" y="195" text-anchor="middle" class="label-text">Application</text>
  <text x="525" y="215" text-anchor="middle" class="small-text">(AT commands or Zephyr stack)</text>

  <!-- Zephyr / Application layer -->
  <rect x="440" y="250" width="170" height="50" class="modem-box" />
  <text x="525" y="270" text-anchor="middle" class="label-text">Application Logic</text>
  <text x="525" y="290" text-anchor="middle" class="small-text">(Shell / Network services)</text>

  <!-- UART pins on right -->
  <rect x="400" y="175" width="20" height="40" fill="#666" opacity="0.3" />

  <!-- Connection lines -->
  <!-- UART connection -->
  <line x1="300" y1="185" x2="400" y2="185" class="connection-line" marker-end="url(#arrowhead)" />
  <line x1="400" y1="205" x2="300" y2="205" class="connection-line" marker-end="url(#arrowhead)" />

  <!-- Labels for connection -->
  <text x="350" y="175" text-anchor="middle" class="connection-text">TX/RX</text>
  <text x="350" y="220" text-anchor="middle" class="connection-text">CTS/RTS, DTR/RI</text>

  <!-- Network cloud on left -->
  <ellipse cx="175" cy="340" rx="60" ry="25" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" />
  <text x="175" y="347" text-anchor="middle" class="small-text">Cellular Network</text>

  <!-- Arrow from modem to network -->
  <line x1="175" y1="300" x2="175" y2="315" class="connection-line" marker-end="url(#arrowhead)" />

  <!-- Legend/Notes at bottom -->
  <text x="50" y="380" class="small-text">• Host Shell sample: Uses AT commands and offloaded sockets</text>
  <text x="50" y="395" class="small-text">• PPP Modem Shell sample: Uses Zephyr networking stack with PPP/CMUX</text>
</svg>
