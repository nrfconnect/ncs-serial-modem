<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Simple diagram styled to match doc/images/dialup-ppp-cmux.svg palette -->
<svg
  width="720"
  height="650"
  viewBox="0 0 720 650"
  version="1.1"
  xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
      .stHost { fill:#6AD1E3; stroke:none; }
      .stBlue { fill:#0077C8; stroke:none; }
      .stGrey { fill:#D9E1E2; stroke:none; }
      .stStroke { fill:none; stroke:none; }
      .stDivider { fill:none; stroke:#000000; stroke-width:2; stroke-dasharray:6,4; }
      .stText { fill:#000000; font-family:Arial; font-size:16px; }
      .stTextSmall { fill:#000000; font-family:Arial; font-size:13px; }
      .stTextInv { fill:#ffffff; font-family:Arial; font-size:16px; }
      .stTextInvSmall { fill:#ffffff; font-family:Arial; font-size:13px; }
      .stTextDark { fill:#000000; font-family:Arial; font-size:13px; }
      .stMono { fill:#000000; font-family:"Courier New", Courier, monospace; font-size:14px; }
      .stMonoSmall { fill:#000000; font-family:"Courier New", Courier, monospace; font-size:12px; }
      .stMonoInv { fill:#ffffff; font-family:"Courier New", Courier, monospace; font-size:14px; }
      .stMonoDark { fill:#333F48; font-family:"Courier New", Courier, monospace; font-size:14px; }
      .stMonoSmallDark { fill:#333F48; font-family:"Courier New", Courier, monospace; font-size:12px; }
    ]]></style>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#000000" />
    </marker>
  </defs>

  <!-- Timeline arrow -->
  <line x1="90" y1="30" x2="90" y2="610" stroke="#000000" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="90" y="635" text-anchor="middle" class="stTextSmall">Time</text>

  <!-- UART stream container -->
  <rect x="140" y="30" width="520" height="580" class="stStroke"/>

  <!-- Header -->
  <rect x="140" y="30" width="520" height="44" class="stBlue"/>
  <text x="400" y="58" text-anchor="middle" class="stTextInv">UART (AT command mode)</text>

  <!-- AT mode area -->
  <rect x="140" y="74" width="520" height="160" class="stGrey"/>

  <!-- AT commands and responses (monospace) -->
  <text x="160" y="102" class="stMonoDark">AT#XPPP=1</text>
  <text x="360" y="102" class="stMonoSmallDark">// Enable PPP</text>

  <text x="160" y="128" class="stMonoDark">OK</text>

  <text x="160" y="160" class="stMonoDark">AT+CFUN=1</text>
  <text x="360" y="160" class="stMonoSmallDark">// Set modem to normal mode</text>

  <text x="160" y="186" class="stMonoDark">OK</text>

  <text x="160" y="218" class="stMonoDark">#XPPP: 1,0,0</text>
  <text x="360" y="218" class="stMonoSmallDark">// PPP started notification</text>

  <!-- Mode switch banner -->
  <line x1="140" y1="234" x2="660" y2="234" class="stDivider"/>
  <rect x="140" y="234" width="520" height="36" class="stBlue"/>
  <text x="400" y="258" text-anchor="middle" class="stTextInvSmall">UART enters PPP data mode</text>

  <!-- PPP mode area -->
  <rect x="140" y="270" width="520" height="256" class="stHost"/>
  <text x="160" y="296" class="stMono">sent [LCP ConfReq ..]</text>
  <text x="160" y="315" class="stMonoSmall">...</text>
  <text x="160" y="334" class="stMono">rcvd [LCP ConfAck ...]</text>
  <text x="160" y="353" class="stMono">sent [IPCP ConfReq ...]</text>
  <text x="160" y="372" class="stMonoSmall">...</text>
  <text x="160" y="391" class="stMono">rcvd [IPCP ConfAck ...]</text>

  <text x="160" y="430" class="stMonoSmall">// ... IP data traffic</text>

  <text x="160" y="474" class="stMonoSmall">// PPP termination</text>
  <text x="160" y="493" class="stMono">sent [LCP TermReq ...]</text>
  <text x="160" y="512" class="stMono">rcvd [LCP TermAck ...]</text>

  <line x1="140" y1="526" x2="660" y2="526" class="stDivider"/>
  <rect x="140" y="526" width="520" height="36" class="stBlue"/>
  <text x="400" y="550" text-anchor="middle" class="stTextInvSmall">UART returns to AT command mode</text>

  <rect x="140" y="562" width="520" height="32" class="stGrey"/>
  <text x="160" y="580" class="stMonoDark">#XPPP: 0,0,0</text>
</svg>
