CONFIG_PM=n

CONFIG_MAIN_STACK_SIZE=10240

CONFIG_BOOT_SWAP_SAVE_ENCTLV=n
CONFIG_BOOT_ENCRYPT_IMAGE=n

CONFIG_BOOT_UPGRADE_ONLY=n
CONFIG_BOOT_BOOTSTRAP=n

### mbedTLS has its own heap
# CONFIG_HEAP_MEM_POOL_SIZE is not set

CONFIG_FLASH=y
CONFIG_FPROTECT=y

### Various Zephyr boards enable features that we don't want.
# CONFIG_BT is not set
# CONFIG_I2C is not set

CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_MCUBOOT_LOG_LEVEL_INF=y
CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="MCUboot"
### Decrease footprint by ~4 KB in comparison to CBPRINTF_COMPLETE=y
CONFIG_CBPRINTF_NANO=y
CONFIG_NRF_RTC_TIMER_USER_CHAN_COUNT=0

### Serial Modem
# Enable mcuboot traces
CONFIG_CONSOLE=y
CONFIG_MCUBOOT_SERIAL=n
CONFIG_BOOT_SERIAL_UART=n
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE_HANDLER=n

# Enable software downgrade prevention for the application.
CONFIG_MCUBOOT_DOWNGRADE_PREVENTION=y

# Firmware version for MCUBoot, used in downgrade prevention in b0.
# Increment when making changes to MCUboot.
CONFIG_FW_INFO_FIRMWARE_VERSION=1

# Enable cleanup of RAM before jumping to the application.
# This is needed because the B0 (NSIB) does not fit into 24 kB of RAM,
# so we cannot use the same size sram0_s partition for B0, MCUboot and TF-M.
# Without this, B0 memory would be left in RAM when jumping to the NS application.
# Note: Relies on B0 and MCUboot being built with the same RAM layout.
CONFIG_MCUBOOT_CLEANUP_RAM=y
