# Partition manager configuration for full modem FOTA with
# CONFIG_TFM_PROFILE_TYPE_NOT_SET.
# TODO: PPP+CMUX doesn't fit with this configuration at the moment.
#       Partition table has to be optimized later.
app:
  address: 0x38000
  end_address: 0x7e000
  placement:
    align:
      start: 0x8000
  region: flash_primary
  size: 0x46000
mcuboot:
  address: 0x0
  end_address: 0x10000
  region: flash_primary
  size: 0x10000
mcuboot_pad:
  address: 0x10000
  end_address: 0x10200
  placement:
    align:
      start: 0x8000
  region: flash_primary
  size: 0x200
mcuboot_primary:
  address: 0x10000
  end_address: 0x86000
  region: flash_primary
  sharers: 0x1
  size: 0x76000
  span:
  - tfm
  - app
  - mcuboot_pad
mcuboot_primary_app:
  address: 0x10200
  end_address: 0x86000
  region: flash_primary
  size: 0x75e00
  span:
  - app
  - tfm
mcuboot_secondary:
  address: 0x86000
  end_address: 0xfc000
  region: flash_primary
  share_size:
  - mcuboot_primary
  size: 0x76000
mcuboot_sram:
  address: 0x20000000
  end_address: 0x20006000
  region: sram_primary
  size: 0x6000
  span:
  - tfm_sram
nonsecure_storage:
  address: 0xfc000
  end_address: 0x100000
  region: flash_primary
  size: 0x4000
  span:
  - settings_storage
otp:
  address: 0xff8108
  end_address: 0xff83fc
  region: otp
  size: 0x2f4
settings_storage:
  address: 0xfc000
  end_address: 0x100000
  inside:
  - nonsecure_storage
  region: flash_primary
  size: 0x4000
sram_secure:
  address: 0x20000000
  end_address: 0x20016000
  region: sram_primary
  size: 0x16000
  span:
  - tfm_sram
tfm:
  address: 0x10200
  end_address: 0x38000
  inside:
  - mcuboot_primary_app
  region: flash_primary
  size: 0x27e00
tfm_its:
  address: 0x7e000
  end_address: 0x80000
  inside:
  - tfm_storage
  region: flash_primary
  size: 0x2000
tfm_nonsecure:
  address: 0x38000
  end_address: 0x7e000
  placement:
    align:
      start: 0x8000
  region: flash_primary
  size: 0x46000
  span:
  - app
tfm_otp_nv_counters:
  address: 0x80000
  end_address: 0x82000
  inside:
  - tfm_storage
  region: flash_primary
  size: 0x2000
tfm_ps:
  address: 0x82000
  end_address: 0x86000
  inside:
  - tfm_storage
  region: flash_primary
  size: 0x4000
tfm_secure:
  address: 0x10200
  end_address: 0x38000
  region: flash_primary
  size: 0x27e00
  span:
  - tfm
tfm_sram:
  address: 0x20000000
  end_address: 0x20016000
  inside:
  - sram_secure
  region: sram_primary
  size: 0x16000
tfm_storage:
  address: 0x7e000
  end_address: 0x86000
  region: flash_primary
  size: 0x8000
  span:
  - tfm_its
  - tfm_otp_nv_counters
  - tfm_ps
